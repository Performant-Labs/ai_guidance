#
# Homepage — Section 2 (Trust bar / client logos).
#
# From the approved Phase 3 homepage brief (docs/pl2/briefs/homepage.md §2).
# Adds a white max-width section containing a centered logo-grid with 6
# client logo-item-canvas entries, one per media entity seeded by
# scripts/seed-client-logos.php.
#
# Per the brief: no copy, no overline, logos not clickable (trust bar
# convention). Goldman omitted pending Prize/Sachs disambiguation.
#
# Inserted directly after the hero (root UUID
# 1651496e-60ab-4ca8-893a-33fe15f89a43).
#
# Apply with (from project root inside DDEV):
#   ddev drush php:script scripts/apply-canvas-page.php \
#     ../content-exports/homepage-section-2.overlay.yml dry-run
# (Drop `dry-run` to actually save.)
#
# Component versions verified against config/sync on 2026-04-21.
# sdc.dripyard_base.section          → e6079b189d228dad
# sdc.dripyard_base.logo-grid        → ce3f2429d9631143
# sdc.dripyard_base.logo-item-canvas → 3c9e4bde3fcefeed  (drifted from
#                                       recipe's db23bb5fe9afd12e — use the
#                                       active_version from config/sync)
#
_meta:
  version: '1.0'
  entity_type: canvas_page
  uuid: bb5bbbb1-4a16-4b86-bbea-b215ab8096cf

overlay:
  add_components:
    # Anchor: insert directly after the hero section root.
    after_uuid: 1651496e-60ab-4ca8-893a-33fe15f89a43

    components:

      # --- Section wrapper (root-level) ---
      - uuid: db4ecb86-bd54-4fdc-8f91-5f586043c4e2
        component_id: sdc.dripyard_base.section
        component_version: e6079b189d228dad
        inputs:
          theme: white
          section_width: max-width
          content_width: max-width
          margin_top: zero
          margin_bottom: zero
          padding_top: medium
          padding_bottom: medium

      # --- Logo grid inside the section's `content` slot ---
      - uuid: 3e957576-deb2-4584-adf1-eac362993aab
