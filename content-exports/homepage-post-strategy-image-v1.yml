      component_id: sdc.dripyard_base.content-card
      component_version: 7afc561cf35c01e5
      inputs: '{"title":"Tools the Drupal community uses","link_href":"\/open-source-projects","body_text":"ATK (Automated Testing Kit) and Testor are ours. Open source, actively maintained, adopted across the ecosystem. Download them, read the source, ask questions.","background":true}'
      label: null
