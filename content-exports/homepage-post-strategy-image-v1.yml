      slot: accordion_group_content
      uuid: f0b93789-5a7d-4a20-8f73-304a53290550
      component_id: sdc.dripyard_base.accordion-item
      component_version: bf19381a421e6f8c
      inputs: '{"title":"What is the Automated Testing Kit (ATK)?","open":false}'
      label: null
    -
      parent_uuid: f0b93789-5a7d-4a20-8f73-304a53290550
      slot: accordion_item_content
      uuid: 5ed89061-c5d5-43f2-83b2-f75ac045c8d9
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"ATK is Performant Labs\u0027 open-source functional testing framework for Drupal, available on Drupal.org. It provides a structured Cypress and PHPUnit test suite that works out of the box with standard Drupal installations - covering forms, roles, content types, and accessibility.","style":"body_m","color":"inherit"}'
      label: null
    -
      parent_uuid: 38307be3-31e3-43e9-9796-73267d45660c
      slot: accordion_group_content
      uuid: 05d56dd9-69f0-484a-8a71-6db6eb882543
      component_id: sdc.dripyard_base.accordion-item
      component_version: bf19381a421e6f8c
      inputs: '{"title":"Do you work with Drupal CMS and contributed distributions?","open":false}'
      label: null
    -
      parent_uuid: 05d56dd9-69f0-484a-8a71-6db6eb882543
      slot: accordion_item_content
      uuid: cb21876f-dc46-40b3-9e10-2f09cc3c012a
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"Yes. We actively contribute to Drupal CMS and a wide range of contributed modules. Our engineers understand how distributions are composed and how to extend them without breaking upstream update paths.","style":"body_m","color":"inherit"}'
      label: null
    -
      parent_uuid: 38307be3-31e3-43e9-9796-73267d45660c
      slot: accordion_group_content
      uuid: 9dbd9b8e-9424-429a-860a-b571f7b268ac
      component_id: sdc.dripyard_base.accordion-item
      component_version: bf19381a421e6f8c
      inputs: '{"title":"How does an engineering engagement work?","open":false}'
      label: null
    -
      parent_uuid: 9dbd9b8e-9424-429a-860a-b571f7b268ac
      slot: accordion_item_content
      uuid: 5bcb2116-b4f7-4627-83d1-a8e6416fbed3
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"We offer staff augmentation (embed our engineers with your team), fixed-scope project delivery, and advisory retainers. Engagements can typically begin within one to two weeks of scoping.","style":"body_m","color":"inherit"}'
      label: null
    -
      parent_uuid: 38307be3-31e3-43e9-9796-73267d45660c
      slot: accordion_group_content
      uuid: 617c985f-df5f-4788-997e-7ac73c19dfc8
      component_id: sdc.dripyard_base.accordion-item
      component_version: bf19381a421e6f8c
      inputs: '{"title":"Can you help with a legacy Drupal 7 or Drupal 9 migration?","open":false}'
      label: null
    -
      parent_uuid: 617c985f-df5f-4788-997e-7ac73c19dfc8
      slot: accordion_item_content
      uuid: 34a2bec3-99cf-4d6b-abef-20edf553bf81
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"Absolutely. We have migrated dozens of legacy Drupal sites to current major versions. Our process covers content, configuration, and custom module refactoring \u2014 with automated tests validating each migration stage.","style":"body_m","color":"inherit"}'
      label: null
    -
      parent_uuid: 0f11d4f2-5715-4180-b73b-fce91ceda2c0
