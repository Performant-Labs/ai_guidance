      slot: header
      uuid: bcc12718-2c3a-48cd-a87b-d1d968b1caa1
      component_id: sdc.dripyard_base.heading
      component_version: 69804e3c5ff45a2b
      inputs: '{"text":"We heal our own tests nightly.","html_element":"h2","style":"h2","margin_top":"zero","margin_bottom":"medium","center":true}'
      label: null
    -
      parent_uuid: c23a78ae-5474-43b8-9695-7800f8eceb7d
      slot: content
      uuid: 62780469-d75e-4c13-8b3b-c7f1e7b2cb42
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"\u003Cp\u003EEvery night, Playwright tests run against this site in CI. When a test breaks, a Claude agent diagnoses the failure, classifies it (test issue or website issue), and \u2014 when appropriate \u2014 opens a pull request with the fix. No Monday-morning flake triage. No staging calls with a QA engineer. The workflow is in our public repo; you can read \u003Ccode\u003Eheal-tests-claude.yml\u003C\/code\u003E \u2014 the code that decides what our AI is allowed to touch. \u003Ca href=\u0022https:\/\/github.com\/Performant-Labs\/pl-performantlabs.com\/blob\/main\/.github\/workflows\/heal-tests-claude.yml\u0022\u003ESee the workflow \u2192\u003C\/a\u003E\u003C\/p\u003E","style":"body_m","color":"inherit"}'
      label: null
    -
      parent_uuid: c23a78ae-5474-43b8-9695-7800f8eceb7d
