      component_version: 7afc561cf35c01e5
      inputs: '{"title":"Experts alongside your team","link_href":"\/services","body_text":"When you need hands, we embed senior testing engineers. North American project leads, nearshore delivery options. Fully billable or fractional.","background":true}'
      label: null
