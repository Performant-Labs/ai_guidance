      uuid: 5138cbe4-6f75-4efc-a608-5ce08e6b4222
      component_id: sdc.dripyard_base.content-card
      component_version: 7afc561cf35c01e5
      inputs: '{"title":"Tests that heal themselves","link_href":"\/how-we-built-this-site","body_text":"AI agents diagnose and fix broken Playwright tests in CI \u2014 nightly, on this very site. Not a demo. A shipped workflow, running right now.","background":true}'
      label: null
    -
