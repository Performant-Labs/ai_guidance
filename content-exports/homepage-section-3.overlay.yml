# Homepage — Section 3 (Three pillars).
#
# From the approved Phase 3 homepage brief (docs/pl2/briefs/homepage.md §3).
#
# Three actions:
#   1. remove_components: drop the old H2 heading "Everything your team
#      needs to build better Drupal." (section header slot).
#   2. component_inputs: rewrite the three content-cards in place (title,
#      body_text) and clear each card's link_href so the new CTA button
#      below is the sole click target (no redundant two-links-to-same-URL).
#   3. add_components: insert three `sdc.dripyard_base.button` components,
#      one into each grid-cell's `content` slot, immediately below each
#      card. Style: bare, size small, suffix_icon arrow-right.
#
# Parent/cell mapping (left to right in the grid):
#   Pillar 1 (tools)  → cell f5a4a12d-87e6-4f60-8f41-69248f431e29
#   Pillar 2 (AI)     → cell 817542f6-4063-4ca8-a252-5e57a07480be
#   Pillar 3 (people) → cell b0c096ed-41d5-4039-9928-33e01c69d6ac
#
# All three new buttons are inserted after the last grid-cell (b0c096ed)
# so every new component lives after its parent in the flattened array
# (per apply-canvas-page.php's ordering constraint). Each button carries
# its own parent_uuid + slot, so they still render inside the correct cell.
#
# Apply with:
#   cd ~/Sites/pl-performantlabs.com.2/web
#   ddev drush php:script ../scripts/apply-canvas-page.php \
#     ../content-exports/homepage-section-3.overlay.yml dry-run
# (Drop `dry-run` to actually save.)

