      inputs: '{"text":"\u003Cp\u003EThe agent doesn\u0027t \u201cfix your tests.\u201d
        It reads the failure, decides what kind of failure it is, and takes the action
        its operating mode allows. Sometimes that\u0027s a PR. Sometimes it\u0027s
        an issue with a diagnosis. Sometimes it\u0027s nothing.\u003C\/p\u003E","style":"body_l","color":"soft"}'
      label: ~
