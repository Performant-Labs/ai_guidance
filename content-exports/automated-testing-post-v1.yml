      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"\u003Cp\u003EEvery night, Playwright tests run against the
        very site you\u0027re reading. When a test breaks, the workflow above fires.
        For the full narrative \u0026mdash; architecture choices, rasterization strategy,
        mobile-spacing reconciliation, and every other decision that shaped this site
        \u0026mdash; read \u003Ca href=\u0022\/how-we-built-this-site\u0022\u003Ehow
        we built this site\u003C\/a\u003E.\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode\u003E-  await
        expect(page.getByRole(\u0027heading\u0027, { name: \u0027Latest articles\u0027
        })).toBeVisible();\n+  await expect(page.getByRole(\u0027heading\u0027, {
        name: \u0027Recent articles\u0027 })).toBeVisible();\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003EOne
        of the commits the agent opened on this repo. A config-rename ripple \u0026mdash;
        Views UI changed the block label; the Playwright assertion had to catch up.
        The agent read the failure output, read the \u003Ccode\u003Eviews.view.*.yml\u003C\/code\u003E
        diff, decided it was a coordinated rename, and shipped the PR. Closed the
        loop in about eleven minutes, start to merge.\u003C\/p\u003E\n\u003Cp\u003EOver
        the last 90 days, \u003Cstrong\u003E[N]\u003C\/strong\u003E tests have been
        auto-healed on this site without human intervention.\u003C\/p\u003E","style":"body_l","color":"soft"}'
      label: ~
