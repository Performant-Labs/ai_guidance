      uuid: 907323ed-7948-407f-a45f-c42abdd18934
      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"\u003Cp\u003EEvery night, Playwright tests run against this
        site in CI. When one fails, a GitHub Action invokes a Claude agent with the
        failure artifacts and the constraints it\u0027s allowed to operate under.
        Here\u0027s the top of \u003Ccode\u003Eheal-tests-claude.yml\u003C\/code\u003E
        \u0026mdash; the file that decides what the AI is permitted to touch:\u003C\/p\u003E\n\u003Cpre\u003E\u003Ccode\u003E#
        Only fix test code in CI. Site-code changes require a human.\noperating_mode:
        ci\npermissions:\n  modify_test_code: true       # selectors, assertions,
        waits\n  modify_site_code: false      # PHP, Twig, JS, CSS - never in CI\n  open_pull_request:
        true\n  auto_merge: false            # a human reviews every PR\nclassification:\n  test_issue:   [selector_outdated,
        assertion_outdated, timing, url_change]\n  website_issue:[element_missing,
        server_error, broken_form, empty_content]\n\u003C\/code\u003E\u003C\/pre\u003E\n\u003Cp\u003ELocally,
        the same agent runs with \u003Ccode\u003Eoperating_mode: local\u003C\/code\u003E
        \u0026mdash; the engineer at the terminal can let it fix site code too, because
        changes can be verified against a running DDEV instance before commit. The
        mode is explicit. The permission flags are explicit. Nothing is implicit.\u003C\/p\u003E","style":"body_l","color":"soft"}'
      label: ~
    - parent_uuid: 1fe50b82-c0ea-4a31-ae9d-27a8d446456b
      slot: content
