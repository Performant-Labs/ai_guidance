      component_id: sdc.dripyard_base.card-canvas
      component_version: 552876d9540c5ead
      inputs: '{"title":"A contrib module renames a class.","body":"A module update
        ships a CSS-class rename. Your ATK smoke test fails overnight on a .field-name-field-foo
        selector that\u0027s now .field-foo. The agent reads the stack trace, checks
        the rendered DOM, classifies as test-fix, opens a PR updating the selector,
        labels it test-fix. Green by morning.","theme":"light"}'
      label: ~
    - parent_uuid: 2245c29b-b3b3-469a-90fc-97ca552b2b2b
      slot: grid_cells
      uuid: 82b2e290-c353-4052-bd26-ff1a808b9076
      component_id: sdc.dripyard_base.card-canvas
      component_version: 552876d9540c5ead
      inputs: '{"title":"A Views block label changes.","body":"Someone renames \u201cLatest
        articles\u201d to \u201cRecent articles\u201d in the Views UI and commits
        the config export. Your Playwright assertion on getByRole(\u0027heading\u0027,
        { name: \u0027Latest articles\u0027 }) fails. The agent reads the config diff,
        sees the coordinated rename, updates the assertion, opens a PR. Not a site
        bug \u2014 a config update the test hadn\u0027t caught up to.","theme":"light"}'
      label: ~
    - parent_uuid: 2245c29b-b3b3-469a-90fc-97ca552b2b2b
      slot: grid_cells
      uuid: 2d8e1407-0336-4586-805c-c6efd76730e3
      component_id: sdc.dripyard_base.card-canvas
      component_version: 552876d9540c5ead
      inputs: '{"title":"The site is actually broken.","body":"A recent commit to
        a custom module nulls out a form field on edit. The test correctly fails.
        The agent diagnoses it as a website-side issue, files an issue with the stack
        trace + hypothesis + suggested fix, and tags the last commit\u0027s author.
        No PR. No auto-merge. A human decides.","theme":"light"}'
      label: ~
    - parent_uuid: 2245c29b-b3b3-469a-90fc-97ca552b2b2b
      slot: grid_cells
      uuid: ae768e91-47a8-4bd4-bfc5-5e479aba6df6
      component_id: sdc.dripyard_base.card-canvas
      component_version: 552876d9540c5ead
      inputs: '{"title":"It\u0027s just flake.","body":"One nightly run, a test fails
        on a transient network blip against Pantheon. The agent retries, the test
        passes, the agent classifies as transient, closes the investigation. No PR.
        No issue. No noise. One line in the run log.","theme":"light"}'
      label: ~
