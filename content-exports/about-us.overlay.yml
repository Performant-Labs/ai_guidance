# /about-us — Phase 3 v1 build.
#
# Translates the approved brief (docs/pl2/briefs/about-us.md, v1 locked
# 2026-04-22) into component-level inserts on a canvas_page uuid that
# André creates via admin UI immediately before overlay-apply.
#
#   ACTION REQUIRED BEFORE `ddev drush php:script apply-canvas-page.php`:
#   Replace PLACEHOLDER-PLACEHOLDER-ABOUTUS-PAGE-UUID below with the
#   real canvas_page uuid, OR export the empty shell with
#   `ddev drush content:export` and splice its uuid into _meta.uuid.
#
# Greenfield build — the /about-us path currently 404s; no legacy entity
# to displace; the stale footer menu link (id 43) gets repointed from
# /about → /about-us in a separate bridge-daemon pass after T3 verify.
#
# Sections emitted (5, per brief §"Page structure"):
#   §1. Hero — h1 + italic subhead + 2 CTAs
#   §2. Depth (on drupal.org since 2006) — h2 + prose + 3-anchor list
#   §3. The tools we wrote — h2 + intro + 2-project HTML block (ATK +
#       Testor) + inline "Other OSS we ship" line + compact "Who we are"
#       block (brief §4 folded inline per D8)
#   §5. We test what we ship — h2 + prose + single button to
#       /how-we-built-this-site
#   §6. Final CTA — h2 + 1-sentence sub-copy + 2 CTAs
#
# Theme alternation: white → light → white → light → white.
#   §6 is `white` (NOT `primary`) — same reasoning as the §6 of
#   /how-we-built-this-site: engineer-audience pages read a loud primary
#   block as marketing affect. Brief tone: "peer-to-peer, not brochure."
#
# Editorial rules enforced:
#   - Playwright named before Cypress any time both appear (memory
#     project_pl2_playwright_first). See §3 ATK card body.
#   - "André Angelantoni" at first mention (§3 "Who we are"); "André"
#     if/when he appears again (not in v1).
#   - "ATK" full name at first mention (§3 ATK card heading uses the
#     full Automated Testing Kit name; body uses ATK).
#
# Rendering dependencies (all already in place from prior commits —
# confirmed via `/how-we-built-this-site` deploy 2026-04-22):
#   - canvas_html_block filter allows: <ul> <li> <ol> <blockquote>
#     <a> <em> <strong> <code>. No <table> needed for /about-us; anchors
#     are rendered as a <ul> with bolded labels.
#   - __root__ sentinel in apply-canvas-page.php (f33618d 2026-04-22).
#
# Apply (after uuid swap):
#   ddev drush php:script scripts/apply-canvas-page.php \
#     content-exports/about-us.overlay.yml dry-run
# Drop `dry-run` to save. Then T1 → T2 → T3 per Three-Tier memory.
#
# Post-apply DB steps (separate alias-bridge commit per
# feedback_alias_swap_after_verify memory — only AFTER T1/T2/T3 pass):
#   1. path_alias insert: path=/node/<eid> alias=/about-us
#      (or canvas_page equivalent path). Verify /about-us resolves 200.
#   2. Menu link id 43 (footer): repoint from internal:/about →
#      internal:/about-us.
#   3. Add new main-nav entry "About" at weight 4 (between Open Source
#      Projects and Contact Us), internal:/about-us.
#   4. Publish the canvas_page (status=1).
#
# Known open items (deferred from v1, per brief "Deliberate omissions"):
#   - No ATK install-count citation (drupal.org usage widget not
#     parseable from the fetch; if André wants the number, re-fetch
#     at draft time and splice into §2 or §3 intro).
#   - No named engineers besides André (D4 locked). When André supplies
#     names, extend §3 "Who we are" text inline — no structural change
#     needed; the sentence "A small team of senior testing engineers
#     work alongside him…" is deliberately bounded to accept insertion.

