              <p>Performant Labs has been on drupal.org for nineteen-plus years — since the Drupal 4.7 era, before automated testing in Drupal was a distinct practice. The work narrowed to testing deliberately, as the rest of the community converged on Drupal's testing ecosystem (Behat, PHPUnit, then Playwright and Cypress). We stayed with it because it's where the hardest, most valuable Drupal problems live: not building the next site, but keeping the critical one working through twelve major-version upgrades.</p>
            style: body_m
            color: soft

