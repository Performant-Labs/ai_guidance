# /services — Phase 3 v1 rebuild.
#
# Translates the approved brief (docs/pl2/briefs/services.md v1,
# approved 2026-04-22, all D1–D10 locked) into component-level
# changes on canvas_page uuid b2613e35-516b-4d7c-86b8-75eb8a5d5356.
#
# One overlay, three anchor points — relies on the multi-block
# `add_components` shape (added to apply-canvas-page.php in commit
# 91001fc on 2026-04-22). Runs as a single atomic pass.
#
# Sections after this overlay (6):
#   1. Hero                — rewritten (new h1, subhead, 2 CTAs)
#   2. Four ways we engage — heading + subhead + 4 cards all patched in place
#   3. Nearshore capacity  — NEW section (heading + body + CTA); deliberately
#                            vague per D5 (tone-guardrail trade-off accepted)
#   4. Dogfooding pointer  — NEW section (heading + body + CTA); direct-land
#                            proof for readers arriving without homepage
#   5. We Speak trust bar  — UNCHANGED (D1 override: 6 sections, bar retained)
#   6. Final CTA           — title-cta composite patched to Book a testing review
#
# Retirements:
#   - Hero flex-wrapper 9e73d47c (cascades: thinker image f88b7db5 + old
#     "Our Services" heading 8f28a7ca). D10 retires the thinker image;
#     replacement Drupal-specific hero asset tracked as task #59. Interim
#     is text-only, centered, matching homepage §1 shape.
#   - §3 "What we do specifically" section e014edc3 (cascades: heading
#     29a57593 + grid-wrapper 8dadac6c + 18 sub-specialty cards). D3
#     retires the whole block.
#
# Anchors:
#   - Block 1 (hero adds) anchors on 9e73d47c so the 4 new components
#     land immediately after it, then the flex-wrapper + its 2 kids
#     vanish via remove_components — net effect is in-place replacement
#     of the hero's contents with 4 new direct children of section
#     52ffa371 in slot=content.
#   - Block 2 (nearshore + dogfooding) anchors on 5f776a8b — the last
#     §2 engagement card. Inserting after it places the 2 new root
#     sections immediately before the (being-removed) §3 section and
#     directly before §5 We Speak. Final render order of roots:
#     §1 → §2 → Nearshore → Dogfooding → We Speak → Final CTA.
#
# Apply with:
#   cd ~/Sites/pl-performantlabs.com.2/web
#   ddev drush php:script ../scripts/apply-canvas-page.php \
#     ../content-exports/services-v1.overlay.yml dry-run
# (Drop `dry-run` to save.)

