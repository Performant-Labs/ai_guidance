  component_inputs:

    # §2 heading — "What we do generally" → "Four ways we engage."
    58425299-d1f4-4743-a5dc-c713b5ab7764:
      text: "Four ways we engage."

    # §2 subhead — retire the build-shop framing ("web site building
    # partner who specializes in building AND testing Drupal sites");
    # new copy re-asserts the boundary.
    bac48626-113e-46ee-9b19-fa07a3b3deec:
      text: "<p>Every engagement is testing work. We don\u0027t build Drupal sites \u2014 we test the ones you already have.</p>"

    # §2 card 1 — "Automated Testing" → "Testing-suite takeover"
    7b67d4d0-6531-4bbb-8573-f92e35fead0e:
      title: "Testing-suite takeover"
      body: "Your Playwright or Cypress suite is broken, flaky, or abandoned. We take it over, fix it, and either hand it back green or keep running it for you. Ships with ATK where useful."

    # §2 card 2 — "Technology Strategy" → "Embedded testing engineer"
    e5700743-ab67-445f-aa18-cb31e1a7f4c1:
      title: "Embedded testing engineer"
      body: "A senior testing engineer joins your team for the duration of a project or release. Pairs with your developers, owns the test strategy, ships with your release cadence."

    # §2 card 3 — "Web Development" → "Autonomous-healing pilot"
    9c6dfdf5-ea98-48fb-a86c-e7407568e6fa:
      title: "Autonomous-healing pilot"
      body: "We install the same Claude-agent workflow we run on this site, scoped to a slice of your existing test suite. You see how it behaves on real failures before committing to a broader rollout."

    # §2 card 4 — "Training & Support" → "Accessibility testing"
    5f776a8b-87e0-4217-a9a4-61cdbb992331:
      title: "Accessibility testing"
      body: "WCAG audits integrated into your CI pipeline. Not a one-time report \u2014 a continuous automated check that catches regressions before deploy."

    # §6 final CTA — retire generic "take your web presence to the next
    # level" framing; match homepage §6 language (Book a testing review).
    509fc6e0-19f4-4339-b284-0c3d602a2fd8:
      title: "Not sure which shape fits? Start with a testing review."
      button_text: "Book a testing review"
      button_href: "/contact-us?intent=testing-review"

