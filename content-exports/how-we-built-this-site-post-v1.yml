        parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
        slot: content
        uuid: 345079f5-cb2d-495f-896c-73c71dcc827c
        component_id: sdc.dripyard_base.text
        component_version: 05732cb45a35eac6
        inputs: '{"text":"\u003Cp\u003EA few things to know:\u003C\/p\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EThe workflow heals; it doesn\u0027t author.\u003C\/strong\u003E Claude doesn\u0027t write new tests. It fixes ones that already exist.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EIt can\u0027t find what\u0027s not broken.\u003C\/strong\u003E A test that passes while checking the wrong thing will never trigger a heal.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETruly flaky tests don\u0027t reproduce reliably.\u003C\/strong\u003E If a failure doesn\u0027t recur on re-run, Claude documents that and moves on.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EEvery PR is reviewed by a human.\u003C\/strong\u003E The classification is Claude\u0027s. The merge is not.\u003C\/li\u003E\n\u003C\/ul\u003E\n\u003Cp\u003EThis isn\u0027t magic. It\u0027s a workflow, a ruleset, and a human in the loop. The things we\u0027ve gotten back are Monday mornings, and the calendar time of a senior engineer we no longer spend on flake triage.\u003C\/p\u003E","style":"body_m","color":"soft"}'
        label: null
      -
        parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
        slot: content
        uuid: cc320dbc-13e7-4154-b6bd-bf7a2462db2e
        component_id: sdc.dripyard_base.heading
        component_version: 69804e3c5ff45a2b
        inputs: '{"text":"Want this running on your site?","html_element":"h2","style":"h2","color":"primary","margin_top":"medium","margin_bottom":"small"}'
