        parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
        slot: content
        uuid: 66f58e9c-3889-4588-a10d-d63fbaf0bf87
        component_id: sdc.dripyard_base.text
        component_version: 05732cb45a35eac6
        inputs: '{"text":"\u003Cp\u003EIf you have a Drupal site with a Playwright suite and nightly CI \u2014 or want to get there \u2014 we run a 30-minute review. We\u0027ll look at your current workflow, tell you honestly where autonomous healing would (and wouldn\u0027t) help, and leave you with a one-page writeup.\u003C\/p\u003E\n\u003Cp\u003ENo sales pitch. No obligation.\u003C\/p\u003E","style":"body_m","color":"soft"}'
