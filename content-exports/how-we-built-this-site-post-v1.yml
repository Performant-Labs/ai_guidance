        inputs: '{"text":"The nightly workflow.","html_element":"h2","style":"h2","color":"primary","margin_top":"zero","margin_bottom":"small"}'
        label: null
      -
        parent_uuid: cb7559db-2938-4305-afc3-dd8d69c59db3
        slot: content
        uuid: fe85aabe-76e4-48bf-86af-4b04a83369ee
        component_id: sdc.dripyard_base.text
        component_version: 05732cb45a35eac6
        inputs: '{"text":"\u003Cp\u003EIt\u0027s two workflows, not one. The first runs the tests; the second heals them.\u003C\/p\u003E\n\u003Cp\u003E\u003Cstrong\u003EWorkflow 1 \u2014 the tester\u003C\/strong\u003E (\u003Ca href=\u0022https:\/\/github.com\/Performant-Labs\/performantlabs.com\/blob\/main\/.github\/workflows\/test-against-pantheon.yml\u0022\u003E\u003Ccode\u003Etest-against-pantheon.yml\u003C\/code\u003E\u003C\/a\u003E). Every night at 23:57 UTC:\u003C\/p\u003E\n\u003Col\u003E\n\u003Cli\u003EPlaywright runs the full suite against \u003Ccode\u003Ehttps:\/\/live-performant-labs.pantheonsite.io\u003C\/code\u003E, sharded across parallel runners for speed.\u003C\/li\u003E\n\u003Cli\u003EResults merge into \u003Ccode\u003Ectrf\/ctrf-report.json\u003C\/code\u003E \u2014 structured JSON describing every pass, fail, and flake.\u003C\/li\u003E\n\u003Cli\u003EIf anything failed, \u003Ccode\u003Eai-ctrf claude\u003C\/code\u003E enriches the CTRF with per-failure summaries (model: \u003Ccode\u003Eclaude-sonnet-4-20250514\u003C\/code\u003E).\u003C\/li\u003E\n\u003Cli\u003EA GitHub issue is opened \u2014 or reused if one is already open \u2014 with the label \u003Ccode\u003Eauto-heal\u003C\/code\u003E.\u003C\/li\u003E\n\u003C\/ol\u003E\n\u003Cp\u003E\u003Cstrong\u003EWorkflow 2 \u2014 the healer\u003C\/strong\u003E (\u003Ca href=\u0022https:\/\/github.com\/Performant-Labs\/performantlabs.com\/blob\/main\/.github\/workflows\/heal-tests-claude.yml\u0022\u003E\u003Ccode\u003Eheal-tests-claude.yml\u003C\/code\u003E\u003C\/a\u003E). On each new \u003Ccode\u003Eauto-heal\u003C\/code\u003E issue:\u003C\/p\u003E\n\u003Col\u003E\n\u003Cli\u003EClaude checks out the repo, reads \u003Ccode\u003ECLAUDE.md\u003C\/code\u003E, and identifies the failing test file(s) from the issue body.\u003C\/li\u003E\n\u003Cli\u003EIt classifies each failure: \u003Cstrong\u003Etest issue\u003C\/strong\u003E or \u003Cstrong\u003Ewebsite issue\u003C\/strong\u003E.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ETest issue\u003C\/strong\u003E \u2192 Claude fixes the test on a branch named \u003Ccode\u003Eclaude\/issue-N\u003C\/code\u003E; a subsequent step opens a PR automatically.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWebsite issue\u003C\/strong\u003E \u2192 Claude posts its analysis as an issue comment. No code changes.\u003C\/li\u003E\n\u003C\/ol\u003E\n\u003Cp\u003EA small detail that matters: the healer fires on \u003Ccode\u003Eissues: [opened]\u003C\/code\u003E, \u003Cem\u003Enot\u003C\/em\u003E \u003Ccode\u003E[labeled]\u003C\/code\u003E. Multiple labels would otherwise trigger multiple duplicate runs.\u003C\/p\u003E","style":"body_m","color":"soft"}'
        label: null
