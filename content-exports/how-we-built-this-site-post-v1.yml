        component_version: 05732cb45a35eac6
        inputs: '{"text":"\u003Ctable\u003E\n\u003Cthead\u003E\u003Ctr\u003E\u003Cth\u003ELayer\u003C\/th\u003E\u003Cth\u003EChoice\u003C\/th\u003E\u003Cth\u003EWhy\u003C\/th\u003E\u003C\/tr\u003E\u003C\/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\u003Ctd\u003ECMS\u003C\/td\u003E\u003Ctd\u003EDrupal 11 (Canvas module v1.3.2)\u003C\/td\u003E\u003Ctd\u003ERecent migration from D10; Canvas is our Layout Builder \/ theming stack.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EHosting\u003C\/td\u003E\u003Ctd\u003EPantheon (dev \u2192 test \u2192 live)\u003C\/td\u003E\u003Ctd\u003EMultidev branches map 1:1 to PR branches.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EE2E tests\u003C\/td\u003E\u003Ctd\u003EPlaywright (primary), Cypress (legacy support)\u003C\/td\u003E\u003Ctd\u003EPlaywright is where autonomous healing lives; Cypress suites still run.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ETest toolkit\u003C\/td\u003E\u003Ctd\u003EATK (our open-source Drupal testing kit)\u003C\/td\u003E\u003Ctd\u003EWe maintain it; using it here is dogfooding.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003ECI\u003C\/td\u003E\u003Ctd\u003EGitHub Actions, nightly cron\u003C\/td\u003E\u003Ctd\u003E\u003Ccode\u003Eheal-tests-claude.yml\u003C\/code\u003E orchestrates the healer; \u003Ccode\u003Etest-against-pantheon.yml\u003C\/code\u003E orchestrates the run.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EReporting\u003C\/td\u003E\u003Ctd\u003ECTRF JSON + Playwright HTML report\u003C\/td\u003E\u003Ctd\u003EStructured failure data is what Claude reads.\u003C\/td\u003E\u003C\/tr\u003E\n\u003Ctr\u003E\u003Ctd\u003EAI\u003C\/td\u003E\u003Ctd\u003EClaude (Sonnet) via Anthropic API\u003C\/td\u003E\u003Ctd\u003EOperating under a \u003Ccode\u003ECLAUDE.md\u003C\/code\u003E ruleset committed to the repo.\u003C\/td\u003E\u003C\/tr\u003E\n\u003C\/tbody\u003E\n\u003C\/table\u003E","style":"body_m","color":"soft"}'
