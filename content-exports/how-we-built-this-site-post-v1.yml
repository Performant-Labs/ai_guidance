        inputs: '{"text":"Where Claude is allowed to touch.","html_element":"h2","style":"h2","color":"primary","margin_top":"zero","margin_bottom":"small"}'
        label: null
      -
        parent_uuid: e9c5aafa-f9ee-4f2a-bb5e-33e589386b48
        slot: content
        uuid: 09a11d10-e684-4f54-a710-83600c311bfb
        component_id: sdc.dripyard_base.text
        component_version: 05732cb45a35eac6
        inputs: '{"text":"\u003Cp\u003EThe guardrails live in a committed file: \u003Ca href=\u0022https:\/\/github.com\/Performant-Labs\/performantlabs.com\/blob\/main\/CLAUDE.md\u0022\u003E\u003Ccode\u003ECLAUDE.md\u003C\/code\u003E\u003C\/a\u003E. It\u0027s not a prompt buried in a secret. It\u0027s in the repo, reviewable like any other code.\u003C\/p\u003E\n\u003Cp\u003EThe load-bearing rule is the \u003Cstrong\u003Etwo-mode split\u003C\/strong\u003E:\u003C\/p\u003E\n\u003Cblockquote\u003E\u003Cp\u003E\u003Cstrong\u003ECI mode\u003C\/strong\u003E (default in GitHub Actions) \u2014 conservative. Only fix test code. Never modify website source.\u003C\/p\u003E\u003C\/blockquote\u003E\n\u003Cblockquote\u003E\u003Cp\u003E\u003Cstrong\u003ELocal mode\u003C\/strong\u003E (when running \u003Ccode\u003Eclaude\u003C\/code\u003E on a developer\u0027s machine) \u2014 aggressive. Fix whatever is broken, test \u003Cem\u003Eor\u003C\/em\u003E website.\u003C\/p\u003E\u003C\/blockquote\u003E\n\u003Cp\u003EThe reasoning is in the file itself: the CI runner cannot deploy code changes to Pantheon, so fixing website code from CI would be pointless. Test-only PRs are safe to review and merge.\u003C\/p\u003E\n\u003Cp\u003EA few other guardrails worth naming:\u003C\/p\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003ETool allowlist\u003C\/strong\u003E in the workflow: Claude can run \u003Ccode\u003Enpx\u003C\/code\u003E, \u003Ccode\u003Enpm\u003C\/code\u003E, \u003Ccode\u003Egit\u003C\/code\u003E, and a handful of read-only shell commands. It cannot \u003Ccode\u003Ecurl\u003C\/code\u003E, \u003Ccode\u003Ewget\u003C\/code\u003E, or touch arbitrary binaries.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E25-turn cap.\u003C\/strong\u003E No runaway sessions.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E10-minute hard timeout.\u003C\/strong\u003E If a fix isn\u0027t obvious in 10 minutes, the run dies and a human picks it up.\u003C\/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EClassification framework\u003C\/strong\u003E in \u003Ccode\u003ECLAUDE.md\u003C\/code\u003E tells Claude how to decide \u0022test issue vs website issue\u0022 \u2014 selector mismatches and stale assertions go in the test-fix bucket; missing elements, broken forms, and 500s go in the website-fix bucket and get a comment, not a PR.\u003C\/li\u003E\n\u003C\/ul\u003E\n\u003Cp\u003ENone of this is clever. All of it is written down.\u003C\/p\u003E","style":"body_m","color":"soft"}'
        label: null
