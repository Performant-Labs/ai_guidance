      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"\u003Cp\u003EWhen a project needs ongoing embedded capacity beyond a single senior engineer, we extend the team with additional senior testing engineers through our nearshore delivery channel. Project leadership stays in North America. Engagements are sized to the work, not to a headcount target. Every engineer on this channel is Drupal-literate and testing-specialist \u2014 we don\u0027t route junior generalists through it.\u003C\/p\u003E","style":"body_l","color":"soft"}'
      label: null
