          slot: header
          inputs:
            text: |-
              <p>Every night, Playwright tests run against this site in CI. When one fails, a GitHub Action invokes a Claude agent with the failure artifacts and the constraints it's allowed to operate under. Here's the top of <code>heal-tests-claude.yml</code> &mdash; the file that decides what the AI is permitted to touch:</p>
              <pre><code># Only fix test code in CI. Site-code changes require a human.
              operating_mode: ci
              permissions:
                modify_test_code: true       # selectors, assertions, waits
                modify_site_code: false      # PHP, Twig, JS, CSS - never in CI
                open_pull_request: true
                auto_merge: false            # a human reviews every PR
              classification:
                test_issue:   [selector_outdated, assertion_outdated, timing, url_change]
                website_issue:[element_missing, server_error, broken_form, empty_content]
              </code></pre>
              <p>Locally, the same agent runs with <code>operating_mode: local</code> &mdash; the engineer at the terminal can let it fix site code too, because changes can be verified against a running DDEV instance before commit. The mode is explicit. The permission flags are explicit. Nothing is implicit.</p>
            style: body_l
            color: soft

