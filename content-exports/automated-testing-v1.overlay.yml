              <p>One of the commits the agent opened on this repo. A config-rename ripple &mdash; Views UI changed the block label; the Playwright assertion had to catch up. The agent read the failure output, read the <code>views.view.*.yml</code> diff, decided it was a coordinated rename, and shipped the PR. Closed the loop in about eleven minutes, start to merge.</p>
