        - uuid: a5a05340-b68c-4fe6-b1d7-eef12da00a15
          parent_uuid: d554d154-2016-4805-b012-002abca7856a
          slot: content
          component_id: sdc.dripyard_base.text
          component_version: 05732cb45a35eac6
          inputs:
            text: |-
              <p>Here's one from this February. Issue <a href="https://github.com/Performant-Labs/performantlabs.com/issues/231">#231</a> landed overnight: Playwright had failed on the Contact Us smoke test. The error: timeout waiting for a link with accessible name <code>"COTACT US"</code>.</p>
              <p>Claude read <code>CLAUDE.md</code>, opened the failing test file, and made the classification:</p>
              <blockquote><p><strong>TEST issue</strong> — The selector text is "COTACT US" (missing the second 'N'). The site's navigation correctly says "CONTACT US". The test's selector is a typo.</p></blockquote>
              <p>It fixed the one-line typo and committed to a <code>claude/issue-231</code> branch:</p>
              <pre><code>-    await page.getByRole('link', { name: 'COTACT US' }).first().click()
              +    await page.getByRole('link', { name: 'CONTACT US' }).first().click()</code></pre>
              <p>(From <code>tests/atk_contact_us/atk_contact_us.spec.js</code>.)</p>
              <p>A human reviewed the PR, confirmed the diff matched the classification, and merged. Commit <a href="https://github.com/Performant-Labs/performantlabs.com/commit/1d0741170f5cbc71090dfaa331f0e2f85e4a511b"><code>1d0741170f</code></a>. No calls. No flake dashboards. No "investigate this next sprint." The whole loop — failure → issue → classification → PR → merge — closed before Monday's standup.</p>
              <p>If the typo had been on the <em>website</em> side instead of the test side (say, the navigation itself said "COTACT US"), the classification would have been <strong>website issue</strong>: Claude would have posted its analysis as a comment on the issue and declined to touch any code. That's not a limitation to work around. That's the contract.</p>
            style: body_m
            color: soft

