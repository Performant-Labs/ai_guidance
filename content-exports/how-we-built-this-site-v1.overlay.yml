            html_element: h2
            style: h2
            color: primary
            margin_top: medium
            margin_bottom: small

        - uuid: 66f58e9c-3889-4588-a10d-d63fbaf0bf87
          parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
          slot: content
          component_id: sdc.dripyard_base.text
          component_version: 05732cb45a35eac6
          inputs:
            text: |-
              <p>If you have a Drupal site with a Playwright suite and nightly CI — or want to get there — we run a 30-minute review. We'll look at your current workflow, tell you honestly where autonomous healing would (and wouldn't) help, and leave you with a one-page writeup.</p>
              <p>No sales pitch. No obligation.</p>
            style: body_m
            color: soft

