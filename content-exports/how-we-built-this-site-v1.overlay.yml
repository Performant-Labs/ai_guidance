        - uuid: fe85aabe-76e4-48bf-86af-4b04a83369ee
          parent_uuid: cb7559db-2938-4305-afc3-dd8d69c59db3
          slot: content
          component_id: sdc.dripyard_base.text
          component_version: 05732cb45a35eac6
          inputs:
            text: |-
              <p>It's two workflows, not one. The first runs the tests; the second heals them.</p>
              <p><strong>Workflow 1 — the tester</strong> (<a href="https://github.com/Performant-Labs/performantlabs.com/blob/main/.github/workflows/test-against-pantheon.yml"><code>test-against-pantheon.yml</code></a>). Every night at 23:57 UTC:</p>
              <ol>
              <li>Playwright runs the full suite against <code>https://live-performant-labs.pantheonsite.io</code>, sharded across parallel runners for speed.</li>
              <li>Results merge into <code>ctrf/ctrf-report.json</code> — structured JSON describing every pass, fail, and flake.</li>
              <li>If anything failed, <code>ai-ctrf claude</code> enriches the CTRF with per-failure summaries (model: <code>claude-sonnet-4-20250514</code>).</li>
              <li>A GitHub issue is opened — or reused if one is already open — with the label <code>auto-heal</code>.</li>
              </ol>
              <p><strong>Workflow 2 — the healer</strong> (<a href="https://github.com/Performant-Labs/performantlabs.com/blob/main/.github/workflows/heal-tests-claude.yml"><code>heal-tests-claude.yml</code></a>). On each new <code>auto-heal</code> issue:</p>
              <ol>
              <li>Claude checks out the repo, reads <code>CLAUDE.md</code>, and identifies the failing test file(s) from the issue body.</li>
              <li>It classifies each failure: <strong>test issue</strong> or <strong>website issue</strong>.</li>
              <li><strong>Test issue</strong> → Claude fixes the test on a branch named <code>claude/issue-N</code>; a subsequent step opens a PR automatically.</li>
              <li><strong>Website issue</strong> → Claude posts its analysis as an issue comment. No code changes.</li>
              </ol>
              <p>A small detail that matters: the healer fires on <code>issues: [opened]</code>, <em>not</em> <code>[labeled]</code>. Multiple labels would otherwise trigger multiple duplicate runs.</p>
            style: body_m
            color: soft

        # ──────────────────────────────────────────────────────────────
        # §4. WHERE CLAUDE IS ALLOWED TO TOUCH — theme=light.
        # Two-mode split rendered as <blockquote>s (verbatim CLAUDE.md
