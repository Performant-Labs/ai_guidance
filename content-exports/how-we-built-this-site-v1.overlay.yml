        - uuid: 09a11d10-e684-4f54-a710-83600c311bfb
          parent_uuid: e9c5aafa-f9ee-4f2a-bb5e-33e589386b48
          slot: content
          component_id: sdc.dripyard_base.text
          component_version: 05732cb45a35eac6
          inputs:
            text: |-
              <p>The guardrails live in a committed file: <a href="https://github.com/Performant-Labs/performantlabs.com/blob/main/CLAUDE.md"><code>CLAUDE.md</code></a>. It's not a prompt buried in a secret. It's in the repo, reviewable like any other code.</p>
              <p>The load-bearing rule is the <strong>two-mode split</strong>:</p>
              <blockquote><p><strong>CI mode</strong> (default in GitHub Actions) — conservative. Only fix test code. Never modify website source.</p></blockquote>
              <blockquote><p><strong>Local mode</strong> (when running <code>claude</code> on a developer's machine) — aggressive. Fix whatever is broken, test <em>or</em> website.</p></blockquote>
              <p>The reasoning is in the file itself: the CI runner cannot deploy code changes to Pantheon, so fixing website code from CI would be pointless. Test-only PRs are safe to review and merge.</p>
              <p>A few other guardrails worth naming:</p>
              <ul>
              <li><strong>Tool allowlist</strong> in the workflow: Claude can run <code>npx</code>, <code>npm</code>, <code>git</code>, and a handful of read-only shell commands. It cannot <code>curl</code>, <code>wget</code>, or touch arbitrary binaries.</li>
              <li><strong>25-turn cap.</strong> No runaway sessions.</li>
              <li><strong>10-minute hard timeout.</strong> If a fix isn't obvious in 10 minutes, the run dies and a human picks it up.</li>
              <li><strong>Classification framework</strong> in <code>CLAUDE.md</code> tells Claude how to decide "test issue vs website issue" — selector mismatches and stale assertions go in the test-fix bucket; missing elements, broken forms, and 500s go in the website-fix bucket and get a comment, not a PR.</li>
              </ul>
              <p>None of this is clever. All of it is written down.</p>
            style: body_m
            color: soft

