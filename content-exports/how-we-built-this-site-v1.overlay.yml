        - uuid: 345079f5-cb2d-495f-896c-73c71dcc827c
          parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
          slot: content
          component_id: sdc.dripyard_base.text
          component_version: 05732cb45a35eac6
          inputs:
            text: |-
              <p>A few things to know:</p>
              <ul>
              <li><strong>The workflow heals; it doesn't author.</strong> Claude doesn't write new tests. It fixes ones that already exist.</li>
              <li><strong>It can't find what's not broken.</strong> A test that passes while checking the wrong thing will never trigger a heal.</li>
              <li><strong>Truly flaky tests don't reproduce reliably.</strong> If a failure doesn't recur on re-run, Claude documents that and moves on.</li>
              <li><strong>Every PR is reviewed by a human.</strong> The classification is Claude's. The merge is not.</li>
              </ul>
              <p>This isn't magic. It's a workflow, a ruleset, and a human in the loop. The things we've gotten back are Monday mornings, and the calendar time of a senior engineer we no longer spend on flake triage.</p>
            style: body_m
            color: soft

        - uuid: cc320dbc-13e7-4154-b6bd-bf7a2462db2e
          parent_uuid: f42ffa77-4700-4d75-9dde-a19254ba5ff6
          slot: content
          component_id: sdc.dripyard_base.heading
          component_version: 69804e3c5ff45a2b
          inputs:
