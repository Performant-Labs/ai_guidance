      component_id: sdc.dripyard_base.text
      component_version: 05732cb45a35eac6
      inputs: '{"text":"\u003Cp\u003E\u003Cem\u003ENearly two decades of Drupal work, narrowed to testing. Author of Automated Testing Kit on drupal.org, and of Testor on GitHub. The dogfooding proof runs on this site, every night.\u003C\/em\u003E\u003C\/p\u003E","style":"body_l","color":"soft"}'
      label: null
