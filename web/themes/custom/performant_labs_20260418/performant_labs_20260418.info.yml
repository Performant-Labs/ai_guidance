#
# Libraries extend will add custom libraries to specified libraries
# @see https://www.drupal.org/docs/develop/theming-drupal/adding-assets-css-js-to-a-drupal-theme-via-librariesyml
#

libraries-extend:
  # Hero — navy-to-amber gradient. Layer 5 component local token override.
  # Trace: L1+L3 ruled out (see css/components/hero.css file header).
  core/components.neonbyte--hero:
    - performant_labs_20260418/hero-override
  # Header — transparent on canvas/front, opaque on scroll, amber CTA.
  # Layer 5: --header-background-color-percent token + .header-cta direct style.
  # Trace: L1+L3 ruled out (see css/components/header.css file header).
  core/components.neonbyte--header:
    - performant_labs_20260418/header-override
  # content-card — white bg, radius-lg, shadow, hover lift.
  # Layer 5: component local token + new structural properties.
  # Trace: L3 ruled out (too broad); L5 .content-card.content-card--has-background (0,2,0).
  core/components.dripyard_base--content-card:
    - performant_labs_20260418/content-card-override
  # accordion — amber chevron icon. variation-borders variant already handles minimal style.
  # Layer 5: new color property on SVG element (.accordion-item__summary svg, 0,2,0).
  # Trace: L3 ruled out (would amber-ify question text too).
  core/components.dripyard_base--accordion-item:
    - performant_labs_20260418/accordion-override
  # tabs — amber filled-pill active indicator (replaces underline).
  # Layer 5: .tabs token overrides (0,1,0) + sl-tab[active]::part(base) new rule.
  # Trace: L3 too broad (affects all alt-color consumers). L5 via ::part() API. ✅
  core/components.dripyard_base--tab-group:
    - performant_labs_20260418/tabs-override

