# Global styles and scripts.
base:
  css:
    theme:
      css/base.css: {}

# Canvas full-width layout — removes layout-container padding on canvas pages.
# Global library (not libraries-extend) — layout guard, not component enhancement.
# The .canvas-page scope (from neonbyte/Canvas module on body) limits its reach.
# Layer 5: .canvas-page .layout-container (0,2,0).
canvas-layout:
  css:
    layout:
      css/layout/canvas.css: {}

# Site-wide vertical spacing normalization.
# Layer 3: retunes --space-for-fixed-header at :root (was 160px; real header
# is ~90px). The .path-frontpage override in canvas.css still resolves to 0.
# Layer 4 companion: zeros top margin on .block-page-title-block h1 so the
# page title isn't pushed down twice. See file header for the full trace.
spacing-normalization:
  css:
    layout:
      css/layout/spacing-normalization.css: {}

# Site-wide typography tuning — link color + whisper underline.
# Layer 3: retunes --theme-link-color at :root (was navy-derived via
#   dripyard_base/css/themes/theme-white.css; this site's brand is aqua).
#   Colour: oklch(0.45 0.11 220) = 6.88:1 on white (passes WCAG AA).
# Layer 4: scoped box-shadow override on .text-content a:not(.button) to
#   soften dripyard's solid "glimmer" underline to a 40%-opacity whisper.
# See file header for the full cascade trace.
typography:
  css:
    layout:
      css/layout/typography.css: {}

# Docs two-column sidebar layout (book content type).
# Global library — .docs-page scope limits reach to pages where
# page--documentation.html.twig renders (Component #8 activates it).
# Layer 5: new rules, no upstream conflict. Improvement: uses
# var(--space-for-fixed-header) for sticky top instead of hardcoded 5rem.
docs-layout:
  css:
    layout:
      css/layout/docs.css: {}

# Hero gradient — navy-to-amber radial gradient on .hero.theme--primary.
# Layer 5: component local token override via libraries-extend.
# Extends: core/components.neonbyte--hero (declared in .info.yml).
hero-override:
  css:
    component:
      css/components/hero.css: {}

# Footer — 'PL' watermark, social icon hover (amber), footer CTA link (amber).
# Layer 5: new pseudo-element + custom classes from page--front.html.twig.
# Nav links already white via token chain — no colour override needed.
# Extends: core/components.neonbyte--footer (declared in .info.yml).
footer-override:
  css:
    component:
      css/components/footer.css: {}

# Transparent sticky header + amber CTA — canvas/front pages.
# Layer 5: component local token override via libraries-extend.
# Extends: core/components.neonbyte--header (declared in .info.yml).
header-override:
  css:
    component:
      css/components/header.css: {}
  js:
    js/header-scroll.js: {}
  dependencies:
    - core/drupal
    - core/once

# content-card — white bg, 16px radius, shadow, hover lift.
# Layer 5: component local token override + new structural properties.
# Extends: core/components.dripyard_base--content-card (declared in .info.yml).
content-card-override:
  css:
    component:
      css/components/content-card.css: {}

# Accordion — amber chevron icon on .accordion-item__summary svg.
# Layer 5: no existing color rule on SVG; new direct property at (0,2,0).
# Extends: core/components.dripyard_base--accordion-item (declared in .info.yml).
accordion-override:
  css:
    component:
      css/components/accordion.css: {}

# Tabs — amber filled-pill active indicator (replaces underline).
# Layer 5: ::part(base) on sl-tab[active] + token overrides on .tabs.
# Extends: core/components.dripyard_base--tab-group (declared in .info.yml).
tabs-override:
  css:
    component:
      css/components/tabs.css: {}

# Statistic — fix zero-width collapse inside flex-wrapper layouts.
# Trace: Dripyard sets container-type: inline-size on .stat (for @container
# query in statistic.css). Without explicit flex-basis/min-width, the flex
# algorithm assigns width: 0 to each .stat → children overflow and overlap.
# Layer 5: new min-width rule at .flex-wrapper__layout > .stat (0,2,1).
# Extends: core/components.dripyard_base--statistic (declared in .info.yml).
statistic-override:
  css:
    component:
      css/components/statistic.css: {}

# header-article — 16:9 aspect-ratio + object-fit cover on hero image.
# Trace: neonbyte sets only width: 100% + margin-top: -150px on
# .header-article__image img; no aspect guard. Square source images
# render as huge squares. Pairs with config-side switch to responsive
# image style 16_9_wide on field_image.
# Extends: core/components.neonbyte--header-article (declared in .info.yml).
header-article-override:
  css:
    component:
      css/components/header-article.css: {}

# article-full — content-body polish for article nodes.
# Currently: distinctive <h5> treatment for code-annotation definition
# labels (@alters-db, @smoke, @skip, ...). Scope tight to .article-full
# .node__content so other h5 usage is untouched.
# Extends: neonbyte/article-full (declared in .info.yml).
article-full-override:
  css:
    component:
      css/components/article-full.css: {}

# book-landing — hero treatment on the book root node (/automated-testing-kit).
# Attached from templates/content/node--book--landing.html.twig via
# attach_library(); the template is itself activated by the
# hook_theme_suggestions_node_alter() hook in the .theme file when the
# current node is a book root (node.book.bid === node.id()).
# Layer 5: new library scoped under `.book-landing` (theme-emitted wrapper).
# No upstream conflict; no libraries-extend.
book-landing:
  css:
    component:
      css/components/book-landing.css: {}

# article-toc — "On this page" sidebar TOC for article-full nodes.
# JS scans h2/h3 inside .article-full .node__content, assigns slug ids,
# injects <nav class="article-toc grid-area--sidebar-second"> as a
# sibling of .grid-area--content. CSS overrides the neonbyte .grid at
# >=1024px so sidebar-second renders as a right sticky column.
# Layer 5: new library; no upstream conflict.
# Extends: neonbyte/article-full (declared in .info.yml).
article-toc:
  css:
    component:
      css/components/article-toc.css: {}
  js:
    js/article-toc.js: {}
  dependencies:
    - core/drupal
    - core/once

